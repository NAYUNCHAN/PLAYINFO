name: CI

# 대표가 로컬 환경에서 직접 검증하기 어려우므로 GitHub가 같은 명령을 대신 실행합니다.
# 이 workflow는 코드 품질과 production build만 확인하며 배포 작업은 수행하지 않습니다.
on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # 커밋된 lock 파일을 기준으로 동일한 의존성 버전을 재현합니다.
      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test date conversion
        run: npm test

      - name: Build
        run: npm run build
